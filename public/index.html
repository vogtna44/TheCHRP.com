<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheCHRP — The Sound Board for Every Reaction</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      padding: 2rem;
    }

    .logo {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    .tagline {
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: #888;
      margin-bottom: 3rem;
      max-width: 480px;
    }

    .cta {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #f5f5f5;
      color: #0a0a0a;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .cta:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <p class="logo">TheCHRP</p>
  <p class="tagline">The sound board for every reaction. Now available on iPhone.</p>
  <a class="cta" href="https://apps.apple.com/app/thechrp" target="_blank" rel="noopener">Download on the App Store</a>
</body>
</html>
